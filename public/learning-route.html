<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>学习路线 · 数字电路学习平台</title><link rel="icon" href="data:,">
<link rel="stylesheet" href="./styles.css?v=20260711-2"><link rel="stylesheet" href="./site-nav.css?v=20260622-1"><link rel="stylesheet" href="./learning-pages.css?v=20260713-1"><link rel="stylesheet" href="./answer-feedback.css?v=20260712-1">
</head>
<body class="inner-page platform-page-body" data-learning-page="route">
  <canvas class="circuit-bg-canvas" data-circuit-background aria-hidden="true"></canvas><div class="circuit-bg-overlay" aria-hidden="true"></div>
  <div class="app">
    <div class="desktop-rail-logo" aria-hidden="true"><img src="./assets/icons/circuit-board.svg" alt=""></div>
    <header class="topbar"><div><p>数字电路课程设计 · Node.js 智能学习平台</p><h1>数字电路个性化学习中心</h1></div><div class="top-actions"><a class="home-return-link" href="./home.html">回到首页</a><nav class="site-nav" aria-label="页面导航"><a class="site-nav__link active" href="./index.html" aria-current="page">学习中心</a><a class="site-nav__link" href="./gate-builder-demo.html">实践中心</a><a class="site-nav__link" href="./labs.html">实验中心</a><a class="site-nav__link" href="./extensions.html">扩展仿真</a></nav></div></header>
    <main class="platform-layout"><aside class="platform-sidebar" data-learning-nav aria-label="学习中心模块导航"></aside><section class="platform-page"><div class="platform-page-frame">
<header class="platform-page-header route-page-header"><div><span class="route-page-kicker">个性化学习路线</span><h2>学习路线</h2><p>按薄弱点安排下一步学习。选择知识点后，系统会同步调整当前任务与针对训练。</p></div><div class="route-header-progress"><span>本轮路线</span><strong id="routeHeaderProgress">正在分析</strong></div></header>
      <div class="route-workspace">
        <aside class="platform-surface route-knowledge-console">
          <div class="platform-section-heading"><div><h3>知识体系</h3><p>选择需要继续加强的知识点。</p></div></div>
          <label class="route-knowledge-search"><span class="sr-only">搜索知识点</span><input id="routeKnowledgeSearch" type="search" placeholder="搜索知识点" autocomplete="off"></label>
          <div id="routeKnowledgeGroups" class="route-knowledge-groups"></div>
          <div class="route-knowledge-legend"><span><i class="mastered"></i>已掌握</span><span><i></i>待加强</span></div>
        </aside>
        <section class="platform-surface route-timeline">
          <div class="platform-section-heading route-path-heading"><div><h3>学习路径</h3><p>每个阶段都由真实答题记录驱动。</p></div><span id="routeProgressSummary" class="route-progress-summary">0 / 4</span></div>
          <div id="routeSteps" class="route-steps"></div>
          <div class="route-evidence"><strong>路线依据</strong><p id="routeEvidenceCopy">正在读取你的学习记录...</p></div>
        </section>
        <aside class="platform-surface route-focus-console">
          <div class="platform-section-heading"><div><h3>当前任务</h3><p>完成后将自动推进学习路线。</p></div></div>
          <span class="route-focus-label">薄弱知识点</span><div id="routeFocusName" class="route-focus-name">正在分析</div>
          <p id="routeFocusCopy" class="route-focus-copy">读取你的学习记录...</p>
          <div class="route-task-meta"><span>预计学习时长<strong>12 分钟</strong></span><span>针对练习<strong id="routeQuestionCountLabel">最多 5 题</strong></span></div>
          <div><span class="route-focus-label">相关知识点</span><div id="routeKnowledgeList" class="route-knowledge-list"></div></div>
          <button id="routeStartButton" class="platform-button primary route-start-button" type="button">开始学习</button>
        </aside>
      </div>
      <section id="routePracticeSection" class="platform-surface" hidden><div data-question-runner="route"></div></section>
    </div></section></main>
  </div>
<script src="./circuit-background.js?v=20260620-1"></script><script src="./learning-shell.js?v=20260712-2"></script><script src="./answer-feedback.js?v=20260712-1"></script><script src="./learning-pages.js?v=20260713-1"></script>
</body></html>
