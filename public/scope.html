<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0;url=./index.html">
  <title>练习范围 · 数字电路学习平台</title>
  <script>window.location.replace("./index.html");</script>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="./styles.css?v=20260711-2">
  <link rel="stylesheet" href="./site-nav.css?v=20260622-1">
  <link rel="stylesheet" href="./learning-pages.css?v=20260712-2">
  <link rel="stylesheet" href="./answer-feedback.css?v=20260712-1">
</head>
<body class="inner-page platform-page-body" data-learning-page="scope">
  <canvas class="circuit-bg-canvas" data-circuit-background aria-hidden="true"></canvas>
  <div class="circuit-bg-overlay" aria-hidden="true"></div>
  <div class="app">
    <div class="desktop-rail-logo" aria-hidden="true"><img src="./assets/icons/circuit-board.svg" alt=""></div>
    <header class="topbar">
      <div><p>数字电路课程设计 · Node.js 智能学习平台</p><h1>数字电路个性化学习中心</h1></div>
      <div class="top-actions">
        <a class="home-return-link" href="./home.html">回到首页</a>
        <nav class="site-nav" aria-label="页面导航">
          <a class="site-nav__link active" href="./index.html" aria-current="page">学习中心</a>
          <a class="site-nav__link" href="./gate-builder-demo.html">电路搭建</a>
          <a class="site-nav__link" href="./labs.html">实验中心</a>
          <a class="site-nav__link" href="./extensions.html">扩展仿真</a>
        </nav>
      </div>
    </header>
    <main class="platform-layout">
      <aside class="platform-sidebar" data-learning-nav aria-label="学习中心模块导航"></aside>
      <section class="platform-page">
        <div class="platform-page-frame">
          <header class="platform-page-header">
            <div><h2>练习范围</h2><p>先确定本轮训练覆盖的知识域，再进入对应题库。范围选择与题库导入集中在这里，不再挤占答题页面。</p></div>
            <div class="platform-header-action"><a id="scopeStartLink" class="platform-button primary" href="./index.html?scope=all">进入所选范围</a></div>
          </header>
          <div class="scope-workspace">
            <section class="scope-domain-list" id="scopeDomainList" aria-label="知识范围"></section>
            <aside class="platform-surface scope-source-console">
              <div class="platform-section-heading"><div><h3>题库来源</h3><p>导入 Word 或文字层 PDF，扩展当前平台题库。</p></div></div>
              <label>选择题库文件<input id="scopeFileInput" type="file" accept=".docx,.pdf"></label>
              <div class="scope-source-actions">
                <button id="scopeImportButton" class="platform-button primary" type="button">导入题库</button>
                <button id="scopeClearImportButton" class="platform-button danger" type="button">清空导入题</button>
              </div>
              <div id="scopeImportStatus" class="platform-notice" hidden></div>
              <div id="scopeSourceList" class="scope-source-list"></div>
            </aside>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="./circuit-background.js?v=20260620-1"></script>
<script src="./learning-shell.js?v=20260714-1"></script>
  <script src="./answer-feedback.js?v=20260712-1"></script>
  <script src="./learning-pages.js?v=20260712-1"></script>
</body>
</html>
