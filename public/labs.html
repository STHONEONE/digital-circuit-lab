<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>数字电路交互仿真实验</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="./labs.css?v=20260621-2">
  <link rel="stylesheet" href="./site-nav.css?v=20260622-1">
</head>
<body class="inner-page lab-page experiment-page experiment-center">
  <canvas class="circuit-bg-canvas" data-circuit-background aria-hidden="true"></canvas>
  <div class="circuit-bg-overlay" aria-hidden="true"></div>
  <div class="lab-background" aria-hidden="true">
    <span class="lab-orb orb-a"></span>
    <span class="lab-orb orb-b"></span>
    <span class="circuit-trace trace-a"></span>
    <span class="circuit-trace trace-b"></span>
    <span class="circuit-trace trace-c"></span>
    <span class="signal-flow flow-a"></span>
    <span class="signal-flow flow-b"></span>
    <span class="signal-flow flow-c"></span>
    <span class="signal-dot dot-a"></span>
    <span class="signal-dot dot-b"></span>
    <span class="signal-dot dot-c"></span>
    <span class="signal-dot dot-d"></span>
    <span class="bit bit-a">0</span>
    <span class="bit bit-b">1</span>
    <span class="bit bit-c">1</span>
    <span class="bit bit-d">0</span>
    <span class="bit bit-e">CLK</span>
    <span class="logic-mark mark-a">AND</span>
    <span class="logic-mark mark-b">JK-FF</span>
    <span class="logic-mark mark-c">DECODER</span>
    <span class="logic-mark mark-d">RAM</span>
    <svg class="background-wave" viewBox="0 0 1200 180" preserveAspectRatio="none">
      <path d="M0 138 H80 V92 H140 V138 H250 V78 H315 V138 H430 V104 H500 V138 H640 V72 H705 V138 H840 V98 H910 V138 H1200"/>
      <path d="M0 158 H120 V128 H235 V158 H390 V112 H520 V158 H720 V126 H850 V158 H1200"/>
      <path d="M0 118 H170 V82 H270 V118 H420 V74 H560 V118 H760 V88 H900 V118 H1200"/>
      <text x="70" y="78">CLK</text>
      <text x="190" y="124">Q0</text>
      <text x="312" y="60">Q1</text>
      <text x="452" y="102">Q2</text>
    </svg>
  </div>
  <header class="lab-topbar">
    <div>
      <p>state → calculate → render → describe</p>
      <h1>数字电路交互仿真实验中心</h1>
    </div>
    <nav class="site-nav" aria-label="页面导航">
      <a class="site-nav__link" href="./index.html">学习中心</a>
      <a class="site-nav__link" href="./gate-builder-demo.html">电路搭建</a>
      <a class="site-nav__link active" href="./labs.html" aria-current="page">实验中心</a>
      <a class="site-nav__link" href="./extensions.html">扩展仿真</a>
    </nav>
  </header>

  <main class="lab-shell">
    <nav id="experimentTabs" class="experiment-tabs" aria-label="实验选择"></nav>

    <section class="lab-grid">
      <article class="circuit-panel">
        <div class="section-heading">
          <div>
            <span id="experimentChapter">实验</span>
            <h2 id="experimentTitle">基本逻辑门</h2>
          </div>
          <button id="demoButton" type="button">自动演示</button>
        </div>

        <div id="controls" class="controls"></div>

        <div id="circuitDiagram" class="circuit-stage" aria-live="polite"></div>

        <section id="timingPanel" class="timing-panel" hidden>
          <div class="timing-heading">
            <div>
              <span>边沿触发过程</span>
              <h3>JK 触发器动态时序图</h3>
              <p id="timingSummary">点击“上升沿”后记录 J、K 与输出状态。</p>
            </div>
            <button id="clearTimingButton" type="button">清空波形</button>
          </div>
          <div id="timingDiagram" class="timing-diagram"></div>
        </section>

        <div class="explanation-card">
          <span>状态讲解</span>
          <p id="stateExplanation"></p>
          <button id="speakButton" type="button">朗读讲解</button>
        </div>
      </article>

      <aside class="truth-panel">
        <div class="section-heading compact">
          <div>
            <span>实时验证</span>
            <h2>真值表 / 状态表</h2>
          </div>
        </div>
        <div id="truthTable" class="truth-table"></div>
      </aside>
    </section>

    <section class="assistant-panel">
      <div class="digital-tutor" aria-hidden="true">
        <div id="tutorFace" class="tutor-face">
          <span class="eye left"></span>
          <span class="eye right"></span>
          <span class="mouth"></span>
        </div>
        <strong>实验助教</strong>
        <small id="voiceStatus">可朗读，也可语音提问</small>
      </div>
      <div class="assistant-chat">
        <div id="labMessages" class="lab-messages">
          <div class="message assistant">改变输入后，我会同步解释电路输出。你也可以直接问“为什么现在输出是 1”。</div>
        </div>
        <div class="assistant-actions">
          <button id="stateQuestionButton" type="button">解释当前状态</button>
          <button id="voiceButton" type="button">语音提问</button>
        </div>
        <div class="assistant-composer">
          <input id="labQuestion" type="text" placeholder="结合当前实验状态提问">
          <button id="askButton" type="button">发送</button>
        </div>
      </div>
    </section>
  </main>

  <script src="./circuit-background.js?v=20260620-1"></script>
  <script src="./labs.js?v=20260620-3"></script>
</body>
</html>
