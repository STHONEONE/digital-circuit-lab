<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>学习报告 · 数字电路学习平台</title><link rel="icon" href="data:,"><link rel="stylesheet" href="./styles.css?v=20260718-1"><link rel="stylesheet" href="./site-nav.css?v=20260622-1"><link rel="stylesheet" href="./learning-pages.css?v=20260718-1"><link rel="stylesheet" href="./answer-feedback.css?v=20260712-1"></head>
<body class="inner-page platform-page-body learning-report-page" data-learning-page="review"><canvas class="circuit-bg-canvas" data-circuit-background aria-hidden="true"></canvas><div class="circuit-bg-overlay" aria-hidden="true"></div><div class="app">
  <div class="desktop-rail-logo" aria-hidden="true"><img src="./assets/icons/circuit-board.svg" alt=""></div>
<header class="topbar"><div><p>数字电路课程设计 · Node.js 智能学习平台</p><h1>数字电路个性化学习中心</h1></div><div class="top-actions"><a class="home-return-link" href="./home.html">回到首页</a><nav class="site-nav" aria-label="页面导航"><a class="site-nav__link active" href="./index.html" aria-current="page">学习中心</a><a class="site-nav__link" href="./gate-builder-demo.html">电路搭建</a><a class="site-nav__link" href="./labs.html">实验中心</a><a class="site-nav__link" href="./extensions.html">专题仿真</a></nav></div></header>
  <main class="platform-layout"><aside class="platform-sidebar" data-learning-nav aria-label="学习中心模块导航"></aside><section class="platform-page"><div class="platform-page-frame">
    <header class="platform-page-header report-hero">
      <div class="report-hero-copy"><h2>学习报告</h2><p id="reviewPeriod">正在汇总你的学习数据...</p><strong id="reviewHeadline">完成练习后，这里会生成你的个性化成长摘要。</strong></div>
      <div class="report-hero-visual" aria-hidden="true"><span></span><svg viewBox="0 0 96 96" fill="none"><rect x="21" y="16" width="54" height="68" rx="10"/><path d="M35 16v-4h26v4M34 63V48M48 63V38M62 63V28M31 72h34"/><circle cx="70" cy="69" r="14"/></svg></div>
    </header>
    <section id="reviewSummary" class="review-summary" aria-label="核心学习指标"></section>
    <div class="review-workspace">
      <section class="platform-surface review-trend-panel"><div class="platform-section-heading report-panel-heading"><div><h3>近 5 题滚动正确率</h3><p>横轴是作答顺序；纵轴是本次及之前最多 5 题的正确率；绿点/红点表示本题对错</p></div><div class="report-range-switch" role="group" aria-label="趋势范围"><button type="button" class="active" data-review-range="all">全部作答</button><button type="button" data-review-range="recent">最近 10 次</button></div></div><div id="reviewTrendChart" class="review-trend-chart"></div><div class="review-chart-legend" aria-label="图表说明"><span class="line">近 5 题正确率</span><span class="correct">本题正确</span><span class="wrong">本题错误</span></div></section>
      <aside class="platform-surface review-action-panel"><div class="platform-section-heading report-panel-heading"><div><h3>下一步建议</h3><p>根据全部作答记录与薄弱知识点生成</p></div></div><div id="reviewAdvice" class="review-advice"></div><div id="reviewActions" class="review-actions"></div></aside>
      <section class="platform-surface review-recent-panel"><div class="platform-section-heading report-panel-heading"><div><h3>最近 10 次作答</h3><p>按时间倒序查看每次练习的题目与结果</p></div><span id="reviewRecentSummary" class="report-panel-count">暂无记录</span></div><div id="reviewRecentList" class="review-recent-list"></div></section>
      <section class="platform-surface review-knowledge-panel"><div class="platform-section-heading report-panel-heading"><div><h3>薄弱知识点</h3><p>优先巩固掌握度较低的内容</p></div><span id="reviewWeakCount" class="report-panel-count">0 项</span></div><div id="reviewKnowledgeList" class="review-knowledge-list"></div></section>
      <section class="platform-surface review-experiment-panel"><div class="platform-section-heading report-panel-heading"><div><h3>实验学习证据</h3><p>预测、仿真覆盖与实验结论会进入掌握度计算</p></div><span id="reviewExperimentCount" class="report-panel-count">0 份</span></div><div id="reviewExperimentList" class="review-experiment-list"></div></section>
    </div>
    <footer class="report-footer"><div id="reviewMessage" class="report-inline-notice" aria-live="polite"></div><div class="report-footer-actions"><button id="reviewRefreshButton" class="platform-button" type="button">刷新数据</button><button id="reviewClearButton" class="platform-button danger" type="button">清空我的记录</button></div></footer>
  </div></section></main>
</div><script src="./circuit-background.js?v=20260620-1"></script><script src="./learning-shell.js?v=20260718-1"></script><script src="./answer-feedback.js?v=20260712-1"></script><script src="./learning-pages.js?v=20260718-1"></script></body></html>
